name: Re-Useable Lint & Static Analysis
on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string

jobs:
  lint:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          cache-suffix: "lint"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system ruff

      - name: Ruff Lint Check
        run: |
          uv run ruff check --output-format=github .

      - name: Ruff Format Check
        run: |
          uv run ruff format --check --diff .

  spell-check:
    name: CSpell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install CSpell
        run: npm install -g cspell@10.0.0

      - name: Run CSpell
        run: |
          cspell lint --no-progress --show-suggestions --show-context ./**/*

  type-check:
    name: Pyright Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          cache-suffix: "type-check"
          enable-cache: true

      - name: Create venv and additional stubs venv
        run: |
          uv sync

          uv venv .stubs-venv
          uv pip install --python .stubs-venv/bin/python -e ".[stubs]"

      - name: Install pyright
        run: |
          npm install -g pyright@1.1.408

      - name: Run Pyright
        run: |
          pyright --outputjson > pyright-results.json || true
          cat pyright-results.json

      - name: Upload Pyright Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pyright-results
          path: pyright-results.json
          retention-days: 7

  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          cache-suffix: "pre-commit"
          enable-cache: true

      - name: Install pre-commit
        run: |
          uv pip install --system pre-commit

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --show-diff-on-failure
        env:
          SKIP: no-commit-to-branch

name: Hammer Build Tool Worker
on:
  workflow_call:
    inputs:
      product-id:
        description: "What Hammer Build workflow to use"
        required: true
        type: string
      version-tag:
        description: "What versioned release tag of the source code to use."
        required: true
        type: string
      python-version:
        description: "Python version used to build and deploy"
        required: true
        type: string
      use-test-pypi:
        description: "Install poly-hammer-build-tool from TestPyPI instead of PyPI"
        required: false
        type: boolean
        default: false
    secrets:
      GH_PAT:
        required: true

jobs:
  build-windows-amd64:
    name: Windows amd64 Build (Python ${{ inputs.python-version }})
    runs-on: windows-latest
    timeout-minutes: 60
    steps:      
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Resolve Hammer Package Spec
        shell: powershell
        run: |
          $indexUrl = if ("${{ inputs.use-test-pypi }}" -eq "true") { "https://test.pypi.org/simple/" } else { "https://pypi.org/simple/" }
          $pipOut = python -m pip index versions poly-hammer-build-tool --index-url $indexUrl 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::error title=Failed to resolve latest package::Unable to query poly-hammer-build-tool versions from $indexUrl"
            $pipOut | Out-String | Write-Output
            exit 1
          }
          $line = $pipOut | Select-String -Pattern '^Available versions:\s*(.+)$' | Select-Object -First 1
          if (-not $line) {
            Write-Output "::error title=Failed to parse package versions::Could not find available versions in pip output."
            $pipOut | Out-String | Write-Output
            exit 1
          }
          $latest = ($line.Matches[0].Groups[1].Value.Split(',')[0]).Trim()
          $spec = "poly-hammer-build-tool==$latest"
          "HAMMER_PACKAGE_VERSION=$latest" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "HAMMER_PACKAGE_SPEC=$spec" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Validate Input
        id: validate
        continue-on-error: true
        shell: powershell
        env:
          HAMMER_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          uv run --python "${{ inputs.python-version }}" --refresh-package poly-hammer-build-tool --with "$env:HAMMER_PACKAGE_SPEC" ${{ inputs.use-test-pypi && '--index https://test.pypi.org/simple/' || '' }} hammer validate --github-token "$env:HAMMER_GITHUB_TOKEN" --product-id "${{ inputs.product-id }}" --python-version "${{ inputs.python-version }}" *>&1 | Tee-Object -FilePath validate.log
          exit $LASTEXITCODE

      - name: Report Validation Failure
        if: steps.validate.outcome == 'failure'
        shell: powershell
        run: |
          $message = "Validation failed for Windows amd64 on Python ${{ inputs.python-version }}."
          Write-Output "::error title=Validation failed::$message"
          @(
            "## Validation failed",
            "",
            "- Job: Windows amd64 Build",
            "- Python version: ${{ inputs.python-version }}",
            "- Product ID: ${{ inputs.product-id }}",
            "- Version tag: ${{ inputs.version-tag }}",
            "",
            "### Failure summary",
            "",
            "The validation step failed before the build started.",
            "",
            "### Log excerpt",
            "",
            '```text'
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          if (Test-Path validate.log) {
            Get-Content -Path validate.log -Tail 120 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }
          '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          exit 1

      - name: Install Build Dependencies
        shell: powershell
        run: |
          choco install cmake -version=3.31.0 -y --ignore-package-exit-codes
          choco install visualstudio2022buildtools -y --ignore-package-exit-codes
          choco install visualstudio2022-workload-vctools -y --ignore-package-exit-codes

      - name: Run Hammer Build Tool
        id: build
        continue-on-error: true
        shell: powershell
        env:
          HAMMER_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          uv run --python "${{ inputs.python-version }}" --refresh-package poly-hammer-build-tool --with "$env:HAMMER_PACKAGE_SPEC" ${{ inputs.use-test-pypi && '--index https://test.pypi.org/simple/' || '' }} hammer build --github-token "$env:HAMMER_GITHUB_TOKEN" --product-id "${{ inputs.product-id }}" --python-version "${{ inputs.python-version }}" *>&1 | Tee-Object -FilePath build.log
          exit $LASTEXITCODE

      - name: Report Build Failure
        if: steps.build.outcome == 'failure'
        shell: powershell
        run: |
          $message = "Build failed for Windows amd64 on Python ${{ inputs.python-version }}."
          Write-Output "::error title=Build failed::$message"
          @(
            "## Build failed",
            "",
            "- Job: Windows amd64 Build",
            "- Python version: ${{ inputs.python-version }}",
            "- Product ID: ${{ inputs.product-id }}",
            "- Version tag: ${{ inputs.version-tag }}",
            "",
            "### Failure summary",
            "",
            "The build step failed after validation completed successfully.",
            "",
            "### Log excerpt",
            "",
            '```text'
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          if (Test-Path build.log) {
            Get-Content -Path build.log -Tail 120 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }
          '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          exit 1
      
      - name: Upload Windows amd64 Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-windows-amd64-py${{ inputs.python-version }}
          path: dist/windows/amd64/
          if-no-files-found: error
          overwrite: true

  build-linux-x86_64:
    name: Linux x86_64 Build (Python ${{ inputs.python-version }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      packages: read

    container:
      image: ghcr.io/poly-hammer/hammer-build-tool-linux:python-${{ inputs.python-version }}
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GH_PAT }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Resolve Hammer Package Spec
        run: |
          index_url="https://pypi.org/simple/"
          if [ "${{ inputs.use-test-pypi }}" = "true" ]; then
            index_url="https://test.pypi.org/simple/"
          fi
          pip_out="$(/usr/local/bin/python${{ inputs.python-version }} -m pip index versions poly-hammer-build-tool --index-url "$index_url" 2>&1)"
          if [ $? -ne 0 ]; then
            echo "::error title=Failed to resolve latest package::Unable to query poly-hammer-build-tool versions from $index_url"
            echo "$pip_out"
            exit 1
          fi
          latest="$(echo "$pip_out" | sed -n 's/^Available versions:[[:space:]]*//p' | head -n1 | cut -d',' -f1 | xargs)"
          if [ -z "$latest" ]; then
            echo "::error title=Failed to parse package versions::Could not find available versions in pip output."
            echo "$pip_out"
            exit 1
          fi
          spec="poly-hammer-build-tool==$latest"
          echo "HAMMER_PACKAGE_VERSION=$latest" >> "$GITHUB_ENV"
          echo "HAMMER_PACKAGE_SPEC=$spec" >> "$GITHUB_ENV"

      - name: Validate Input
        id: validate
        continue-on-error: true
        env:
          HAMMER_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -o pipefail
          uv run --python "/usr/local/bin/python${{ inputs.python-version }}" --refresh-package poly-hammer-build-tool --with "$HAMMER_PACKAGE_SPEC" ${{ inputs.use-test-pypi && '--index https://test.pypi.org/simple/' || '' }} hammer validate --github-token "$HAMMER_GITHUB_TOKEN" --product-id "${{ inputs.product-id }}" --python-version "${{ inputs.python-version }}" 2>&1 | tee validate.log

      - name: Report Validation Failure
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::error title=Validation failed::Validation failed for Linux x86_64 on Python ${{ inputs.python-version }}."
          {
            echo "## Validation failed"
            echo
            echo "- Job: Linux x86_64 Build"
            echo "- Python version: ${{ inputs.python-version }}"
            echo "- Product ID: ${{ inputs.product-id }}"
            echo "- Version tag: ${{ inputs.version-tag }}"
            echo
            echo "### Failure summary"
            echo
            echo "The validation step failed before the build started."
            echo
            echo "### Log excerpt"
            echo
            echo '```text'
            tail -n 120 validate.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Run Hammer Build Tool
        id: build
        continue-on-error: true
        env:
          HAMMER_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -o pipefail
          uv run --python "/usr/local/bin/python${{ inputs.python-version }}" --refresh-package poly-hammer-build-tool --with "$HAMMER_PACKAGE_SPEC" ${{ inputs.use-test-pypi && '--index https://test.pypi.org/simple/' || '' }} hammer build --github-token "$HAMMER_GITHUB_TOKEN" --product-id "${{ inputs.product-id }}" --python-version "${{ inputs.python-version }}" 2>&1 | tee build.log

      - name: Report Build Failure
        if: steps.build.outcome == 'failure'
        run: |
          echo "::error title=Build failed::Build failed for Linux x86_64 on Python ${{ inputs.python-version }}."
          {
            echo "## Build failed"
            echo
            echo "- Job: Linux x86_64 Build"
            echo "- Python version: ${{ inputs.python-version }}"
            echo "- Product ID: ${{ inputs.product-id }}"
            echo "- Version tag: ${{ inputs.version-tag }}"
            echo
            echo "### Failure summary"
            echo
            echo "The build step failed after validation completed successfully."
            echo
            echo "### Log excerpt"
            echo
            echo '```text'
            tail -n 120 build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Upload Linux x86_64 Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-linux-x86_64-py${{ inputs.python-version }}
          path: dist/linux/x86_64/
          if-no-files-found: error
          overwrite: true

  build-mac-arm64:
    name: Mac arm64 Build (Python ${{ inputs.python-version }})
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      PCRE_MAJOR_VERSION: "10"
      PCRE_MINOR_VERSION: "44"
    steps:      
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Resolve Hammer Package Spec
        run: |
          index_url="https://pypi.org/simple/"
          if [ "${{ inputs.use-test-pypi }}" = "true" ]; then
            index_url="https://test.pypi.org/simple/"
          fi
          pip_out="$(python -m pip index versions poly-hammer-build-tool --index-url "$index_url" 2>&1)"
          if [ $? -ne 0 ]; then
            echo "::error title=Failed to resolve latest package::Unable to query poly-hammer-build-tool versions from $index_url"
            echo "$pip_out"
            exit 1
          fi
          latest="$(echo "$pip_out" | sed -n 's/^Available versions:[[:space:]]*//p' | head -n1 | cut -d',' -f1 | xargs)"
          if [ -z "$latest" ]; then
            echo "::error title=Failed to parse package versions::Could not find available versions in pip output."
            echo "$pip_out"
            exit 1
          fi
          spec="poly-hammer-build-tool==$latest"
          echo "HAMMER_PACKAGE_VERSION=$latest" >> "$GITHUB_ENV"
          echo "HAMMER_PACKAGE_SPEC=$spec" >> "$GITHUB_ENV"

      - name: Validate Input
        id: validate
        continue-on-error: true
        env:
          HAMMER_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -o pipefail
          uv run --python "${{ inputs.python-version }}" --refresh-package poly-hammer-build-tool --with "$HAMMER_PACKAGE_SPEC" ${{ inputs.use-test-pypi && '--index https://test.pypi.org/simple/' || '' }} hammer validate --github-token "$HAMMER_GITHUB_TOKEN" --product-id "${{ inputs.product-id }}" --python-version "${{ inputs.python-version }}" 2>&1 | tee validate.log

      - name: Report Validation Failure
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::error title=Validation failed::Validation failed for Mac arm64 on Python ${{ inputs.python-version }}."
          {
            echo "## Validation failed"
            echo
            echo "- Job: Mac arm64 Build"
            echo "- Python version: ${{ inputs.python-version }}"
            echo "- Product ID: ${{ inputs.product-id }}"
            echo "- Version tag: ${{ inputs.version-tag }}"
            echo
            echo "### Failure summary"
            echo
            echo "The validation step failed before the build started."
            echo
            echo "### Log excerpt"
            echo
            echo '```text'
            tail -n 120 validate.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Install Homebrew and Dependencies
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          brew install make bzip2 libffi zlib libxml2 rsync llvm autoconf automake tcl-tk

      - name: Run Hammer Build Tool
        id: build
        continue-on-error: true
        env:
          HAMMER_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -o pipefail
          uv run --python "${{ inputs.python-version }}" --refresh-package poly-hammer-build-tool --with "$HAMMER_PACKAGE_SPEC" ${{ inputs.use-test-pypi && '--index https://test.pypi.org/simple/' || '' }} hammer build --github-token "$HAMMER_GITHUB_TOKEN" --product-id "${{ inputs.product-id }}" --python-version "${{ inputs.python-version }}" 2>&1 | tee build.log

      - name: Report Build Failure
        if: steps.build.outcome == 'failure'
        run: |
          echo "::error title=Build failed::Build failed for Mac arm64 on Python ${{ inputs.python-version }}."
          {
            echo "## Build failed"
            echo
            echo "- Job: Mac arm64 Build"
            echo "- Python version: ${{ inputs.python-version }}"
            echo "- Product ID: ${{ inputs.product-id }}"
            echo "- Version tag: ${{ inputs.version-tag }}"
            echo
            echo "### Failure summary"
            echo
            echo "The build step failed after validation completed successfully."
            echo
            echo "### Log excerpt"
            echo
            echo '```text'
            tail -n 120 build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Upload Mac arm64 Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-mac-arm64-py${{ inputs.python-version }}
          path: dist/mac/arm64/
          if-no-files-found: error
          overwrite: true

  release:
    needs: [build-linux-x86_64, build-windows-amd64, build-mac-arm64]
    name: Release (Python ${{ inputs.python-version }})
    runs-on: ubuntu-latest
    steps:      
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Resolve Hammer Package Spec
        run: |
          index_url="https://pypi.org/simple/"
          if [ "${{ inputs.use-test-pypi }}" = "true" ]; then
            index_url="https://test.pypi.org/simple/"
          fi
          pip_out="$(python -m pip index versions poly-hammer-build-tool --index-url "$index_url" 2>&1)"
          if [ $? -ne 0 ]; then
            echo "::error title=Failed to resolve latest package::Unable to query poly-hammer-build-tool versions from $index_url"
            echo "$pip_out"
            exit 1
          fi
          latest="$(echo "$pip_out" | sed -n 's/^Available versions:[[:space:]]*//p' | head -n1 | cut -d',' -f1 | xargs)"
          if [ -z "$latest" ]; then
            echo "::error title=Failed to parse package versions::Could not find available versions in pip output."
            echo "$pip_out"
            exit 1
          fi
          spec="poly-hammer-build-tool==$latest"
          echo "HAMMER_PACKAGE_VERSION=$latest" >> "$GITHUB_ENV"
          echo "HAMMER_PACKAGE_SPEC=$spec" >> "$GITHUB_ENV"

      - name: Download Mac arm64 Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-mac-arm64-py${{ inputs.python-version }}
          path: dist/mac/arm64
          
      - name: Download Linux x86_64 Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-linux-x86_64-py${{ inputs.python-version }}
          path: dist/linux/x86_64

      - name: Download Windows amd64 Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-windows-amd64-py${{ inputs.python-version }}
          path: dist/windows/amd64

      - name: Deploy Addon
        id: deploy
        continue-on-error: true
        env:
          HAMMER_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -o pipefail
          uv run --python "${{ inputs.python-version }}" --refresh-package poly-hammer-build-tool --with "$HAMMER_PACKAGE_SPEC" ${{ inputs.use-test-pypi && '--index https://test.pypi.org/simple/' || '' }} hammer deploy --github-token "$HAMMER_GITHUB_TOKEN" --repo "${{ github.repository }}" --product-id "${{ inputs.product-id }}" --version-tag "${{ inputs.version-tag }}" --python-version "${{ inputs.python-version }}" 2>&1 | tee deploy.log

      - name: Report Deploy Failure
        if: steps.deploy.outcome == 'failure'
        run: |
          echo "::error title=Deploy failed::Deploy failed on Python ${{ inputs.python-version }}."
          {
            echo "## Deploy failed"
            echo
            echo "- Job: Release"
            echo "- Python version: ${{ inputs.python-version }}"
            echo "- Product ID: ${{ inputs.product-id }}"
            echo "- Version tag: ${{ inputs.version-tag }}"
            echo
            echo "### Failure summary"
            echo
            echo "The deploy step failed after all platform builds completed."
            echo
            echo "### Log excerpt"
            echo
            echo '```text'
            tail -n 120 deploy.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1